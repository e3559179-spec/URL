<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Bean Card - Figma Ready</title>

<style>
body{
  margin:0;
  background:#f0f0f0;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
  display:flex;
  justify-content:center;
}

/* 页面 */
.page{
  width:390px;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:24px;
}

/* 卡片 */
.card{
  border-radius:24px;
  padding:20px;
  color:#fff;
  display:flex;
  flex-direction:column;
  gap:16px;

  /* 高级渐变（方案C🔥） */
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), transparent 40%),
    radial-gradient(circle at 70% 70%, rgba(255,140,80,0.35), transparent 50%),
    linear-gradient(135deg, #1e1e2f, #3a3a5f);

  box-shadow:0 10px 40px rgba(0,0,0,0.25);
}

/* header */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  width:36px;
  height:36px;
  border-radius:50%;
  background:#fff;
}

.code{
  font-size:12px;
  letter-spacing:1px;
  opacity:0.8;
}

/* 标题 */
.title{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.title h1{
  font-size:24px;
  margin:0;
  font-weight:600;
}

.title p{
  font-size:13px;
  opacity:0.7;
  margin:0;
}

/* 分割线 */
.divider{
  height:1px;
  background:rgba(255,255,255,0.2);
}

/* 信息 */
.info{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.item{
  display:flex;
  flex-direction:column;
  gap:2px;
}

.label{
  font-size:11px;
  opacity:0.6;
}

.value{
  font-size:14px;
}

/* 标签 */
.tags{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.tag{
  padding:6px 12px;
  border-radius:14px;
  background:rgba(255,255,255,0.2);
  font-size:12px;
}

/* 文本 */
.text{
  font-size:14px;
  line-height:1.7;
}

/* 冲煮 */
.brew{
  display:grid;
  grid-template-columns:80px 1fr;
  gap:8px;
  font-size:13px;
}

</style>
</head>

<body>

<div class="page">

  <!-- 正面 -->
  <div class="card">

    <div class="header">
      <div class="logo"></div>
      <div class="code">No.0021</div>
    </div>

    <div class="title">
      <h1>西达摩·花魁</h1>
      <p>SIDAMO FLOWER CROWN</p>
    </div>

    <div class="divider"></div>

    <div class="info">
      <div class="item"><div class="label">产地</div><div class="value">埃塞俄比亚</div></div>
      <div class="item"><div class="label">庄园</div><div class="value">西达摩</div></div>
      <div class="item"><div class="label">豆种</div><div class="value">原生种</div></div>
      <div class="item"><div class="label">处理法</div><div class="value">水洗</div></div>
      <div class="item"><div class="label">烘焙</div><div class="value">浅烘焙</div></div>
      <div class="item"><div class="label">批次</div><div class="value">2026.03</div></div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="label">风味</div>
      <div class="tags">
        <div class="tag">草莓</div>
        <div class="tag">橙子</div>
        <div class="tag">蜂蜜</div>
      </div>
    </div>

  </div>


  <!-- 背面 -->
  <div class="card">

    <div>
      <div class="label">豆子故事</div>
      <div class="text">
        这支来自西达摩的咖啡具有清晰花香与果汁感，
        甜感干净，余韵细腻且持久，呈现优雅层次。
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="label">冲煮建议</div>
      <div class="brew">
        <div>器具</div><div>V60</div>
        <div>粉水比</div><div>1:15</div>
        <div>水温</div><div>92℃</div>
        <div>时间</div><div>1:45</div>
        <div>研磨</div><div>中细</div>
      </div>
    </div>

  </div>

</div>

</body>
</html>
