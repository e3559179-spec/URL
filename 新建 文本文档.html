<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咖啡豆卡样式Demo - 正反面展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .demo-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 800px;
        }

        .card-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .card-label {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        /* ====== 豆卡基础样式 ====== */
        .bean-card {
            width: 320px;
            aspect-ratio: 3 / 4;
            position: relative;
            border-radius: 16px;
            background: linear-gradient(145deg, #f9f6f1 0%, #f5f0e8 100%);
            box-shadow: 0 4px 20px rgba(101, 67, 33, 0.1);
            overflow: hidden;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        /* ====== 正面样式 ====== */
        .card-front .top-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .card-front .brand-logo {
            width: 40px;
            height: 40px;
            background: #e8e0d6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8b6914;
            font-size: 10px;
            font-weight: 600;
        }

        .card-front .card-number {
            color: #a89f91;
            font-size: 12px;
            font-weight: 400;
        }

        .card-front .title-section {
            margin-bottom: 20px;
        }

        .card-front .title-chinese {
            font-size: 24px;
            font-weight: 700;
            color: #5d4037;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .card-front .title-english {
            font-size: 11px;
            font-weight: 400;
            color: #8b6914;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-front .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(to right, #d4c4b0 0%, #e8e0d6 100%);
            margin: 16px 0;
        }

        .card-front .info-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .card-front .info-item {
            display: flex;
            flex-direction: column;
        }

        .card-front .info-label {
            font-size: 10px;
            color: #a89f91;
            margin-bottom: 2px;
        }

        .card-front .info-value {
            font-size: 13px;
            font-weight: 500;
            color: #3e2723;
        }

        .card-front .flavor-section {
            margin-top: auto;
        }

        .card-front .flavor-label {
            font-size: 10px;
            color: #a89f91;
            margin-bottom: 8px;
        }

        .card-front .flavor-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .card-front .flavor-tag {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            color: white;
        }

        .card-front .flavor-tag.tag1 {
            background: linear-gradient(135deg, #d4a574 0%, #c49663 100%);
        }

        .card-front .flavor-tag.tag2 {
            background: linear-gradient(135deg, #b89b7a 0%, #a68866 100%);
        }

        .card-front .flavor-tag.tag3 {
            background: linear-gradient(135deg, #8b6f47 0%, #7a5f3d 100%);
        }

        /* ====== 背面样式 ====== */
        .card-back .story-section {
            margin-bottom: 24px;
        }

        .card-back .section-title {
            font-size: 12px;
            font-weight: 600;
            color: #8b6914;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-back .section-title::before {
            content: '';
            width: 3px;
            height: 12px;
            background: linear-gradient(to bottom, #8b6914, #6d5233);
            border-radius: 2px;
            margin-right: 2px;
        }

        .card-back .story-text {
            font-size: 13px;
            line-height: 1.8;
            color: #4a4a4a;
            text-align: justify;
        }

        .card-back .brew-section {
            margin-top: auto;
        }

        .card-back .brew-params {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 8px 16px;
        }

        .card-back .brew-row {
            display: contents;
        }

        .card-back .brew-label {
            font-size: 10px;
            color: #a89f91;
            align-self: center;
        }

        .card-back .brew-value {
            font-size: 13px;
            font-weight: 500;
            color: #3e2723;
            align-self: center;
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <!-- 正面展示 -->
        <div class="card-wrapper">
            <div class="card-label">正面 - Front Side</div>
            <div class="bean-card card-front">
                <!-- 顶部区域 -->
                <div class="top-section">
                    <div class="brand-logo">LOGO</div>
                    <div class="card-number">No.0021</div>
                </div>

                <!-- 标题区域 -->
                <div class="title-section">
                    <div class="title-chinese">西达摩·花魁</div>
                    <div class="title-english">SIDAMO FLOWER CROWN</div>
                </div>

                <!-- 分隔线 -->
                <div class="divider"></div>

                <!-- 核心信息区 -->
                <div class="info-section">
                    <div class="info-item">
                        <span class="info-label">产地</span>
                        <span class="info-value">埃塞俄比亚</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">庄园</span>
                        <span class="info-value">西达摩</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">豆种</span>
                        <span class="info-value">原生种</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">处理法</span>
                        <span class="info-value">水洗</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">烘焙程度</span>
                        <span class="info-value">浅烘焙</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">批次</span>
                        <span class="info-value">2026.03</span>
                    </div>
                </div>

                <!-- 分隔线 -->
                <div class="divider"></div>

                <!-- 风味标签区 -->
                <div class="flavor-section">
                    <div class="flavor-label">风味</div>
                    <div class="flavor-tags">
                        <span class="flavor-tag tag1">柑橘</span>
                        <span class="flavor-tag tag2">花香</span>
                        <span class="flavor-tag tag3">巧克力</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 背面展示 -->
        <div class="card-wrapper">
            <div class="card-label">背面 - Back Side</div>
            <div class="bean-card card-back">
                <!-- 豆子故事区域 -->
                <div class="story-section">
                    <div class="section-title">豆子故事</div>
                    <p class="story-text">这支来自西达摩的咖啡具有清晰花香与果汁感，甜感干净，余韵细腻而持久，呈现出优雅且层次分明的风味结构。</p>
                </div>

                <!-- 冲煮建议区域 -->
                <div class="brew-section">
                    <div class="section-title">冲煮建议</div>
                    <div class="brew-params">
                        <div class="brew-row">
                            <span class="brew-label">器具</span>
                            <span class="brew-value">V60</span>
                        </div>
                        <div class="brew-row">
                            <span class="brew-label">粉水比</span>
                            <span class="brew-value">1:15</span>
                        </div>
                        <div class="brew-row">
                            <span class="brew-label">水温</span>
                            <span class="brew-value">92℃</span>
                        </div>
                        <div class="brew-row">
                            <span class="brew-label">时间</span>
                            <span class="brew-value">1:45</span>
                        </div>
                        <div class="brew-row">
                            <span class="brew-label">研磨</span>
                            <span class="brew-value">中细研磨</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
